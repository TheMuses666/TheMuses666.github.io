---
layout: default
---

<main class="article-shell section-block">
  <article class="article">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">Back to lab archive</a>
    <p class="section-index">{{ page.section_index }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="hero-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    {% if page.excerpt_text %}
      <p class="hero-text">{{ page.excerpt_text }}</p>
    {% endif %}

    {{ content }}
  </article>
</main>
